<style>
    .my-navigation {
    border-bottom: 2px solid #ccc; /* Цвет границы можно изменить */
}
</style>
<section class="my-navigation">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                {% if user.is_authenticated %}
                <div class="navbar-nav me-auto mb-2 mb-lg-0">
                    <a href="{% url 'diary:list_posts' %}" class="btn btn-outline-primary me-2">Главная</a>
                    <a href="{% url 'diary:create_post' %}" class="btn btn-outline-primary me-2">Сделать новую запись</a>
                </div>

                <form action="{% url 'diary:search' %}" method="get" class="d-flex" role="search">
                    <input name="q" class="form-control me-2" type="search" placeholder="Поиск" aria-label="Поиск">
                    <button class="btn btn-outline-success me-2" type="submit">Найти</button>
                </form>
                <a href="{% url 'users:profile' %}" class="btn btn-outline-primary me-2">Профиль</a>
                <a href="{% url 'users:logout' %}" class="btn btn-outline-primary me-2">Выход</a>
                {% endif %}
            </div>
        </div>
    </nav>
</section>
